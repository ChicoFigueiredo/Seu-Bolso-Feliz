  <script>
    window.MathJax = {
      tex: {
        // Os delimitadores são emitidos pelo markdown-it-texmath dentro de
        // elementos <eq> e <eqn> — não precisamos que o MathJax varra texto livre.
        inlineMath: [["\\(", "\\)"]],
        displayMath: [["\\[", "\\]"]],
        processEscapes: false,
        processEnvironments: false,
        processRefs: false
      },
      options: {
        // Processar apenas os elementos emitidos pelo markdown-it-texmath.
        // Isso evita que cifrões isolados (R$, $99, etc.) sejam interpretados.
        processHtmlClass: "math-inline|math-block",
        skipHtmlTags: [
          "script", "noscript", "style", "textarea",
          "pre", "code", "annotation", "annotation-xml"
        ]
      },
      startup: {

      }
    };
  </script>

  <style>

    .mermaid-svg-container {

    .mermaid-svg-container svg {

    .mermaid-wrapper.fullscreen {
      position: fixed;

      z-index: 9999;

    <script type="module">
      import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";

    mermaid.initialize({
      startOnLoad: false,
      theme: "default",
      securityLevel: "loose",
      flowchart: {
        useMaxWidth: false,
        htmlLabels: true
      }
    });

    function setupMermaidZoom(container) {
      const svgContainer = container.querySelector(".mermaid-svg-container");
      if (!svgContainer) {
        return;
      }

      const svg = svgContainer.querySelector("svg");
      if (!svg) {
        return;
      }

      let scale = 1;
      let translateX = 0;
      let translateY = 0;
      let isDragging = false;
      let startX = 0;
      let startY = 0;

      const applyTransform = () => {
        svg.style.transform = "translate(" + translateX + "px, " + translateY + "px) scale(" + scale + ")";
        svg.style.transformOrigin = "0 0";
      };

      const getSvgSize = () => {
        const viewBox = svg.viewBox && svg.viewBox.baseVal;
        if (viewBox && viewBox.width > 0 && viewBox.height > 0) {
          return { width: viewBox.width, height: viewBox.height };
        }

        const box = svg.getBBox();
        return { width: box.width || 1, height: box.height || 1 };
      };

      const fitToContainer = () => {
        const containerWidth = Math.max(svgContainer.clientWidth, 200);
        const containerHeight = Math.max(svgContainer.clientHeight, 240);
        const svgSize = getSvgSize();

        const scaleX = containerWidth / svgSize.width;
        const scaleY = containerHeight / svgSize.height;

        scale = Math.min(scaleX, scaleY, 1) * 0.95;
        translateX = (containerWidth - svgSize.width * scale) / 2;
        translateY = 20;
        applyTransform();
      };

      const zoomIn = container.querySelector(".zoom-in");
      const zoomOut = container.querySelector(".zoom-out");
      const zoomFit = container.querySelector(".zoom-fit");
      const zoomReset = container.querySelector(".zoom-reset");
      const zoomFullscreen = container.querySelector(".zoom-fullscreen");

      if (zoomIn) {
        zoomIn.addEventListener("click", () => {
          scale *= 1.18;
          applyTransform();
        });
      }

      if (zoomOut) {
        zoomOut.addEventListener("click", () => {
          scale /= 1.18;
          applyTransform();
        });
      }

      if (zoomFit) {
        zoomFit.addEventListener("click", fitToContainer);
      }

      if (zoomReset) {
        zoomReset.addEventListener("click", () => {
          scale = 1;
          translateX = 0;
          translateY = 0;
          applyTransform();
        });
      }

      if (zoomFullscreen) {
        zoomFullscreen.addEventListener("click", () => {
          if (!container.classList.contains("fullscreen")) {
            container.classList.add("fullscreen");
            zoomFullscreen.textContent = "✖️ Sair Fullscreen";
            zoomFullscreen.title = "Sair da tela cheia";
            document.body.style.overflow = "hidden";
            setTimeout(fitToContainer, 120);
          } else {
            container.classList.remove("fullscreen");
            zoomFullscreen.textContent = "⛶ Fullscreen";
            zoomFullscreen.title = "Tela cheia";
            document.body.style.overflow = "";
            setTimeout(fitToContainer, 80);
          }
        });
      }

      svgContainer.addEventListener("mousedown", (event) => {
        if (event.target && event.target.closest("a")) {
          return;
        }
        isDragging = true;
        startX = event.clientX - translateX;
        startY = event.clientY - translateY;
        svg.style.cursor = "grabbing";
      });

      document.addEventListener("mousemove", (event) => {
        if (!isDragging) {
          return;
        }
        translateX = event.clientX - startX;
        translateY = event.clientY - startY;
        applyTransform();
      });

      document.addEventListener("mouseup", () => {
        isDragging = false;
        svg.style.cursor = "grab";
      });

      svgContainer.addEventListener("wheel", (event) => {
        event.preventDefault();
        const delta = event.deltaY > 0 ? 0.92 : 1.08;
        scale *= delta;
        applyTransform();
      });

      setTimeout(fitToContainer, 60);
    }

    async function renderMermaidBlocks() {
      const blocks = document.querySelectorAll(".mermaid-diagram");
      for (let i = 0; i < blocks.length; i += 1) {
        const block = blocks[i];
        const code = block.textContent || "";

        try {
          const rendered = await mermaid.render("mermaid-" + i, code);
          const wrapper = block.parentElement;
          if (!wrapper) {
            continue;
          }

          wrapper.innerHTML = ""
            + '<div class="mermaid-controls">'
            + '<button class="mermaid-btn zoom-in" title="Aumentar zoom">🔍+</button>'
            + '<button class="mermaid-btn zoom-out" title="Diminuir zoom">🔍-</button>'
            + '<button class="mermaid-btn zoom-fit" title="Ajustar a tela">⛶ Ajustar</button>'
            + '<button class="mermaid-btn zoom-reset" title="Resetar zoom">↻ Resetar</button>'
            + '<button class="mermaid-btn zoom-fullscreen" title="Tela cheia">⛶ Fullscreen</button>'
            + '</div>'
            + '<div class="mermaid-svg-container">' + rendered.svg + '</div>';

          setupMermaidZoom(wrapper);
        } catch (error) {
          block.outerHTML = '<pre class="mermaid-error">❌ Erro ao renderizar Mermaid.</pre>';
          console.error(error);
        }
      }
    }

    function ensureHeadingAnchors() {
      const headings = document.querySelectorAll(".doc-card h1, .doc-card h2, .doc-card h3, .doc-card h4");
      for (let i = 0; i < headings.length; i += 1) {
        const heading = headings[i];
        if (!heading.id) {
          heading.id = "sec-" + (i + 1);
        }

        const anchor = document.createElement("a");
        anchor.className = "anchor";
        anchor.href = "#" + heading.id;
        anchor.textContent = "🔗";
        anchor.setAttribute("aria-label", "Copiar ancora");
        heading.appendChild(anchor);
      }
    }

    function buildNavigationToc() {
      const container = document.getElementById("toc-list");
      const headings = Array.from(document.querySelectorAll(".doc-card h1, .doc-card h2, .doc-card h3"));

      if (!container) {
        return;
      }

      if (headings.length === 0) {
        container.innerHTML = "<li><span>Sem secoes detectadas.</span></li>";
        return;
      }

      const html = headings
        .map((heading) => {
          const level = Number(heading.tagName.replace("H", ""));
          const indent = String(Math.max(0, level - 1) * 12);
          const text = heading.textContent ? heading.textContent.replace("🔗", "").trim() : "(sem titulo)";
          return ""
            + "<li>"
            + '<a href="#' + heading.id + '" style="margin-left:' + indent + 'px">'
            + "📍 " + text
            + "</a>"
            + "</li>";
        })
        .join("");

      container.innerHTML = html;

      const tocLinks = Array.from(container.querySelectorAll("a"));
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            const id = entry.target.getAttribute("id");
            if (!id) {
              return;
            }

            const link = tocLinks.find((item) => item.getAttribute("href") === "#" + id);
            if (!link) {
              return;
            }

            if (entry.isIntersecting) {
              tocLinks.forEach((item) => item.classList.remove("active"));
              link.classList.add("active");
            }
          });
        },
        { rootMargin: "-30% 0px -55% 0px", threshold: 0.01 }
      );

      headings.forEach((heading) => observer.observe(heading));
    }

    function setupQuickActions() {
      const topButton = document.getElementById("go-top");
      if (topButton) {
        topButton.addEventListener("click", () => {
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      }

      const mobileToggle = document.getElementById("toggle-rail");
      const rail = document.getElementById("rail");
      if (mobileToggle && rail) {
        mobileToggle.addEventListener("click", () => {
          rail.classList.toggle("open");
          mobileToggle.textContent = rail.classList.contains("open") ? "✖️ Fechar menu" : "🧭 Navegar";
        });
      }
    }

    function typesetMath() {
      if (!window.MathJax) {
        return;
      }

      // Seleciona apenas os elementos emitidos pelo markdown-it-texmath.
      // <eq>  = math inline   ($...$)
      // <eqn> = math em bloco ($$...$$  ou  egin{equation}...end{equation})
      // Passando a lista de elementos, o MathJax nao varre texto livre do DOM,
      // o que evita que R$, $15, etc. sejam interpretados como LaTeX.
      const mathElements = Array.from(document.querySelectorAll("eq, eqn"));

      if (mathElements.length === 0) {
        return;
      }

      const run = () => {
        if (window.MathJax.typesetPromise) {
          window.MathJax.typesetPromise(mathElements).catch((error) => {
            console.error("Erro no MathJax:", error);
          });
        }
      };

      if (window.MathJax.startup && window.MathJax.startup.promise) {
        window.MathJax.startup.promise.then(run).catch((error) => {
          console.error("Erro no MathJax startup:", error);
        });
      } else {
        run();
      }
    }

    window.addEventListener("DOMContentLoaded", async () => {
      ensureHeadingAnchors();
      await renderMermaidBlocks();
      buildNavigationToc();
      setupQuickActions();
      typesetMath();
    });
  </script>
</head>
